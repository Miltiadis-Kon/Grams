<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css?family=Sofia+Pro&display=swap" rel="stylesheet" />
  <link href="./css/main.css" rel="stylesheet" />
  <title>Grams - Account</title>
</head>
<body>
  <div class="v701_1067">
    <!-- Profile Info Card -->
    <div class="profile-header-card" style="display: flex; align-items: center; gap: 16px; background: linear-gradient(135deg, var(--primary-100), #59a5a9); padding: 20px; border-radius: 24px; box-shadow: 0 8px 24px rgba(111,185,190,0.25); margin-top: 20px; margin-bottom: 24px; color: white;">
      <div style="width: 64px; height: 64px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.4); background: rgba(255,255,255,0.2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 26px; color: white;">A</div>
      <div style="flex: 1;">
        <span style="display: block; font-family: 'Outfit'; font-weight: 700; font-size: 20px; letter-spacing: -0.5px; margin: 0;">Alena Sabyan</span>
        <span style="display: block; font-size: 13px; opacity: 0.9; margin-top: 2px;">Recipe Developer</span>
      </div>
    </div>

    <!-- Manual Review Access Card -->
    <div id="manualReviewCard" onclick="switchView('manual')" style="display: flex; align-items: center; justify-content: space-between; background: #fffbeb; border: 1px solid #fef3c7; padding: 18px 20px; border-radius: 20px; box-shadow: 0 4px 12px rgba(245,158,11,0.05); margin-bottom: 24px; cursor: pointer; transition: transform 0.2s;">
      <div style="display: flex; align-items: center; gap: 14px;">
        <div style="background: #fef3c7; color: #d97706; width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px;">⚠️</div>
        <div>
          <span style="display: block; font-family: 'Outfit'; font-weight: 700; font-size: 15px; color: #78350f;">Manual Review</span>
          <span style="display: block; font-size: 12px; color: #b45309; margin-top: 2px;">Resolve parsing failures manually</span>
        </div>
      </div>
      <div id="manualCheckBadge" style="background: #dc2626; color: white; font-family: 'Outfit'; font-weight: 700; font-size: 12px; padding: 4px 10px; border-radius: 20px; display: none;">0</div>
    </div>

    <!-- Saved Favorites List -->
    <div class="favorites-section">
      <div style="margin-bottom: 12px;">
        <span style="font-family: 'Outfit'; font-weight: 700; font-size: 20px; color: #0a2533; position: relative;">My Favorites</span>
      </div>
      <div id="favoritesContainer" style="display: flex; flex-direction: column; gap: 12px; margin-top: 16px;"></div>
    </div>
  </div>
</body>
</html>
