<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css?family=Sofia+Pro&display=swap" rel="stylesheet" />
  <link href="./css/main.css" rel="stylesheet" />
  <title>Grams - Recipe Details</title>
</head>
<body>
  <div class="v701_949">
    <!-- Floating Back & Favorite Button -->
    <button class="back-btn" onclick="switchView('home')" style="display: flex; align-items: center; justify-content: center;">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
    </button>
    
    <button class="favorite-btn" id="detailFavoriteBtn" style="position: absolute; top: 44px; right: 20px; width: 44px; height: 44px; border-radius: 50%; border: none; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; box-shadow: 0 4px 12px rgba(10,37,51,0.08); color: #748189; transition: all 0.2s;">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M4.318 6.318a4.5 4.5 0 0 0 0 6.364L12 20.364l7.682-7.682a4.5 4.5 0 0 0-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 0 0-6.364 0z"/></svg>
    </button>
    
    <!-- Recipe Large Header Image / Video Player -->
    <div class="v701_950" id="detailImage" style="cursor: pointer; position: relative;">
      <div class="v701_951" id="detailImageOverlay" style="background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0) 35%, rgba(0,0,0,0.6)); width: 100%; height: 100%; position: absolute; inset: 0;"></div>
      <!-- Video Play Button Overlay -->
      <div id="videoPlayBtn" style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 5; background: rgba(0,0,0,0.15); pointer-events: none;">
        <div style="width: 56px; height: 56px; border-radius: 50%; background: rgba(255,255,255,0.9); box-shadow: 0 4px 20px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; color: var(--primary-100); transition: transform 0.2s;">
          <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24" style="margin-left: 4px;"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
      <!-- Embedded Inline Video Container -->
      <div id="headerVideoPlayer" style="display: none; position: absolute; inset: 0; z-index: 6; background: #000;"></div>
    </div>

    <!-- Scroll Details Container -->
    <div class="v701_953">
      <div class="v701_954"></div>
      <div class="v701_955"></div>
      
      <div class="v701_956">
        <!-- Title & Time (Description below title removed) -->
        <div style="margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px;">
          <h1 id="detailTitle" style="font-family: 'Outfit'; font-weight: 800; font-size: 24px; color: #0a2533; margin: 0; line-height: 1.25; position: relative;">Healthy Taco Salad</h1>
          <div style="display: flex; align-items: center; gap: 6px; font-size: 13px; color: #748189; font-weight: 600; position: relative;">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 8v4l3 3M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20z"/></svg>
            <span id="detailTime">15 Min</span>
          </div>
        </div>

        <!-- Figma Styled Macros Panel -->
        <div class="v701_1039" style="position: relative; top: 0; left: 0; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 24px; background: var(--primary-20); padding: 14px; border-radius: 18px;">
          <div style="text-align: center;">
            <span id="detailMacrosProtein" style="display: block; font-family: 'Outfit'; font-weight: 700; font-size: 16px; color: var(--primary-100);">0g</span>
            <span style="font-size: 10px; text-transform: uppercase; color: #748189; font-weight: 600;">Protein</span>
          </div>
          <div style="text-align: center;">
            <span id="detailMacrosCarbs" style="display: block; font-family: 'Outfit'; font-weight: 700; font-size: 16px; color: var(--primary-100);">0g</span>
            <span style="font-size: 10px; text-transform: uppercase; color: #748189; font-weight: 600;">Carbs</span>
          </div>
          <div style="text-align: center;">
            <span id="detailMacrosFats" style="display: block; font-family: 'Outfit'; font-weight: 700; font-size: 16px; color: var(--primary-100);">0g</span>
            <span style="font-size: 10px; text-transform: uppercase; color: #748189; font-weight: 600;">Fats</span>
          </div>
          <div style="text-align: center;">
            <span id="detailMacrosCals" style="display: block; font-family: 'Outfit'; font-weight: 700; font-size: 16px; color: var(--secondary-100);">0</span>
            <span style="font-size: 10px; text-transform: uppercase; color: #748189; font-weight: 600;">Kcal</span>
          </div>
        </div>

        <!-- Creator Row -->
        <div class="v701_1022">
          <div style="width: 42px; height: 42px; border-radius: 50%; background: var(--primary-100); display: flex; align-items: center; justify-content: center; color: white; font-family: 'Outfit'; font-weight: 700; font-size: 16px;" id="detailCreatorAvatar">N</div>
          <div style="flex: 1; min-width: 0; padding-left: 12px; text-align: left;">
            <span class="v701_1023" id="detailCreatorName" style="display: block; font-weight: 700; font-size: 15px; color: #0a2533; font-family: 'Outfit';">Natalia Luca</span>
            <span class="v701_1024" id="detailCreatorSubtitle" style="display: block; font-size: 12px; color: #748189;">Original Video Creator</span>
          </div>
        </div>

        <!-- Portion Size Multiplier -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
          <span style="font-family: 'Outfit'; font-weight: 700; font-size: 18px; color: #0a2533;">Servings</span>
          <div class="multiplier-group" style="display: flex; gap: 4px; background: var(--primary-20); padding: 4px; border-radius: 12px; border: 1px solid var(--primary-40);">
            <button type="button" class="btn-mult" data-val="0.5" onclick="setPortionMultiplier(0.5)" style="padding: 6px 12px; border: none; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; background: transparent; color: var(--primary-100); transition: all 0.2s;">0.5</button>
            <button type="button" class="btn-mult active" data-val="1.0" onclick="setPortionMultiplier(1.0)" style="padding: 6px 12px; border: none; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; background: var(--primary-100); color: white; transition: all 0.2s;">1</button>
            <button type="button" class="btn-mult" data-val="2.0" onclick="setPortionMultiplier(2.0)" style="padding: 6px 12px; border: none; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; background: transparent; color: var(--primary-100); transition: all 0.2s;">2</button>
          </div>
        </div>

        <!-- Ingredients Section with Instructions Button next to Ingredients -->
        <div style="margin-top: 24px;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 2px solid var(--primary-40); padding-bottom: 6px; gap: 12px;">
            <div style="display: flex; align-items: baseline; gap: 8px;">
              <span style="font-family: 'Outfit'; font-weight: 700; font-size: 18px; color: #0a2533;">Ingredients</span>
              <span id="detailIngCount" style="font-size: 12px; color: #748189; white-space: nowrap;">0 items</span>
            </div>
            <!-- Trigger button to show instructions modal -->
            <button id="showInstructionsBtn" onclick="openInstructionsModal()" style="padding: 6px 12px; background: var(--primary-100); color: white; border: none; border-radius: 12px; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; font-family: inherit; transition: all 0.2s; box-shadow: 0 4px 12px rgba(111,185,190,0.2);">
              📋 Instructions
            </button>
          </div>
          <div class="v701_961" id="detailIngList" style="width: 100% !important; position: relative !important;"></div>
        </div>

        <!-- Actions (Edit/Delete) at the end of the recipe -->
        <div style="display: flex; gap: 12px; margin-top: 28px; border-top: 1px solid var(--primary-40); padding-top: 20px;">
          <button class="btn-edit" id="detailsEditBtn" style="flex: 1; padding: 12px; border-radius: 12px; font-size: 14px; font-weight: 700; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; border: 1px solid var(--primary-100); color: var(--primary-100); background: transparent; transition: all 0.2s;" onclick="openEdit(currentDetailsId)">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Edit Recipe
          </button>
          <button class="btn-delete" id="detailsDeleteBtn" style="flex: 1; padding: 12px; border-radius: 12px; font-size: 14px; font-weight: 700; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; border: 1px solid #dc2626; color: #dc2626; background: transparent; transition: all 0.2s;" onclick="deleteRecipePrompt(currentDetailsId)">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            Delete Recipe
          </button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
