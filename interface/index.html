<!-- ==================== JAVASCRIPT APP LOGIC ==================== -->
<script>
let db = {};
let activeCategory = 'all';
let currentView = 'home';
let html5QrCode = null;
let recalcDebounce = null;
let currentDetailsId = null;
let currentRecipeIngredients = [];
let currentRecipeMacros = {};
let currentRecipeDetailedIngredients = [];

// Favorites system based on localStorage
let favorites = JSON.parse(localStorage.getItem('grams_favorites') || '[]');

// Estimate emojis for ingredient presentation
function getIngredientEmoji(name) {
  name = name.toLowerCase();
  if (name.includes('chicken') || name.includes('poultry')) return '🍗';
  if (name.includes('beef') || name.includes('steak') || name.includes('meat') || name.includes('pork')) return '🥩';
  if (name.includes('egg')) return '🥚';
  if (name.includes('fish') || name.includes('salmon') || name.includes('tuna') || name.includes('seafood')) return '🐟';
  if (name.includes('shrimp') || name.includes('prawn')) return '🍤';
  if (name.includes('oil') || name.includes('butter')) return '🧈';
  if (name.includes('rice') || name.includes('quinoa') || name.includes('grain')) return '🍚';
  if (name.includes('bread') || name.includes('flour') || name.includes('dough')) return '🍞';
  if (name.includes('tomato') || name.includes('sauce') || name.includes('paste')) return '🍅';
  if (name.includes('cheese') || name.includes('mozzarella') || name.includes('parmesan')) return '🧀';
  if (name.includes('garlic') || name.includes('onion')) return '🧄';
  if (name.includes('potato') || name.includes('fry') || name.includes('fries')) return '🥔';
  if (name.includes('broccoli') || name.includes('spinach') || name.includes('kale') || name.includes('salad') || name.includes('greens')) return '🥦';
  if (name.includes('lemon') || name.includes('lime') || name.includes('citrus')) return '🍋';
  if (name.includes('avocado')) return '🥑';
  if (name.includes('milk') || name.includes('cream') || name.includes('yogurt')) return '🥛';
  if (name.includes('honey') || name.includes('sugar') || name.includes('sweetener')) return '🍯';
  if (name.includes('chocolate') || name.includes('cocoa')) return '🍫';
  if (name.includes('pepper') || name.includes('spice') || name.includes('salt')) return '🌶️';
  return '🥗'; // default
}

// Get TikTok embed URL
function getTikTokEmbedUrl(url) {
  if (!url) return '';
  const m = url.match(/\/video\/(\d+)/);
  return m && m[1] ? `https://www.tiktok.com/player/v1/${m[1]}?rel=0&loop=1&autoplay=1&music_info=0&description=0&controls=1` : '';
}

function getRecipeImageUrl(r) {
  if (r && r.url) {
    return `/api/thumbnail?url=${encodeURIComponent(r.url)}`;
  }
  return (r && r.image) ? r.image : 'baker.png';
}

function getCreatorHandle(url) {
  if (!url) return 'TikTok Creator';
  const m = url.match(/tiktok\.com\/@([^\/]+)/);
  return m && m[1] ? '@' + m[1] : 'TikTok Creator';
}

// Extract instructions steps
function getSteps(desc) {
  if (!desc) return [];
  let cleanDesc = desc.replace(/Instructions:?/i, '').trim();
  const stepRegex = /(?:\r?\n|^|\s)(?:Step\s+)?(\d+)[.:\)-]\s*/gi;
  const parts = cleanDesc.split(stepRegex);
  
  if (parts.length > 2) {
    const steps = [];
    for (let i = 1; i < parts.length; i += 2) {
      const num = parts[i];
      const text = parts[i+1] ? parts[i+1].trim() : '';
      if (text) {
        steps.push({ num: parseInt(num) || (steps.length + 1), text });
      }
    }
    if (steps.length > 0) return steps;
  }
  
  const sentences = cleanDesc.split(/\r?\n|(?<=[.!?])\s+/);
  return sentences
    .map(s => s.trim())
    .filter(s => s.length > 10)
    .map((text, idx) => ({ num: idx + 1, text }));
}

// Database loader
async function loadDB() {
  try {
    const r = await fetch('recipes_db.json');
    db = await r.json();
  } catch(e) {
    db = {};
  }
  render();
}

function setCategory(cat, el) {
  activeCategory = cat;
  document.querySelectorAll('.category-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  render();
}

function focusSearch() {
  switchView('home');
  document.getElementById('searchInput').focus();
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  return Object.entries(db).filter(([id, r]) => {
    // Category tags filtering
    if (activeCategory !== 'all') {
      const tags = (r.tags || []).map(t => t.toLowerCase());
      const matchesTag = tags.includes(activeCategory);
      const matchesName = (r.name || '').toLowerCase().includes(activeCategory);
      if (!matchesTag && !matchesName) return false;
    }
    
    // Search query filtering
    if (!q) return true;
    if (q.includes(',')) {
      const terms = q.split(',').map(t => t.trim()).filter(Boolean);
      return terms.every(term => 
        (r.ingredients||[]).some(i => (i.name||'').toLowerCase().includes(term))
      );
    }
    return (
      (r.name||'').toLowerCase().includes(q) ||
      (r.description||'').toLowerCase().includes(q) ||
      (r.ingredients||[]).some(i => (i.name||'').toLowerCase().includes(q)) ||
      (r.tags||[]).some(t => t.toLowerCase().includes(q))
    );
  });
}

function formatMultipliedQty(qtyStr, mult) {
  if (!qtyStr) return '';
  const match = qtyStr.match(/^\s*(\d+(?:\.\d+)?)\s*(.*)$/);
  if (match) {
    const num = parseFloat(match[1]) || 0;
    const unit = match[2] || '';
    const newNum = Number((num * mult).toFixed(2));
    return `${newNum}${unit ? ' ' + unit.trim() : ''}`;
  }
  return qtyStr;
}

// Swipe Gesture Handler
function makeSwipeable(element) {
  let startX = 0;
  let startY = 0;
  let currentX = 0;
  let isDragging = false;
  let isScroll = false;
  const maxSlide = -80;
  
  function handleStart(clientX, clientY) {
    document.querySelectorAll('.swipeable-content').forEach(el => {
      if (el !== element) {
        el.style.transform = 'translateX(0px)';
      }
    });
    startX = clientX;
    startY = clientY;
    isDragging = true;
    isScroll = false;
    element.style.transition = 'none';
  }
  
  function handleMove(clientX, clientY, e) {
    if (!isDragging) return;
    const diffX = clientX - startX;
    const diffY = clientY - startY;
    
    if (!isScroll) {
      if (Math.abs(diffY) > Math.abs(diffX) && Math.abs(diffY) > 5) {
        isScroll = true;
        isDragging = false;
        element.style.transition = 'transform 0.2s ease-out';
        element.style.transform = 'translateX(0px)';
        return;
      }
    }
    
    if (isScroll) return;
    
    if (Math.abs(diffX) > 5) {
      if (e.cancelable) e.preventDefault();
    }
    
    if (diffX < 0) {
      currentX = Math.max(diffX, maxSlide);
    } else {
      currentX = Math.min(diffX, 0);
    }
    element.style.transform = `translateX(${currentX}px)`;
  }
  
  function handleEnd() {
    if (!isDragging) return;
    isDragging = false;
    element.style.transition = 'transform 0.2s ease-out';
    if (currentX < maxSlide / 2) {
      currentX = maxSlide;
      element.style.transform = `translateX(${maxSlide}px)`;
    } else {
      currentX = 0;
      element.style.transform = 'translateX(0px)';
    }
  }

  element.addEventListener('touchstart', e => {
    handleStart(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });
  
  element.addEventListener('touchmove', e => {
    handleMove(e.touches[0].clientX, e.touches[0].clientY, e);
  }, { passive: false });
  
  element.addEventListener('touchend', () => {
    handleEnd();
  }, { passive: true });

  element.addEventListener('mousedown', e => {
    handleStart(e.clientX, e.clientY);
    
    const onMouseMove = ev => {
      handleMove(ev.clientX, ev.clientY, ev);
    };
    
    const onMouseUp = () => {
      handleEnd();
      window.removeEventListener('mousemove', onMouseMove);
      window.removeEventListener('mouseup', onMouseUp);
    };
    
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);
  });
}

// Parsing quantity units
function parseQtyString(qtyStr) {
  if (!qtyStr) return { num: 1, unit: 'g' };
  const match = qtyStr.match(/^\s*(\d+(?:\.\d+)?)\s*([a-zA-Z\s\.]+)?$/);
  if (match) {
    const num = parseFloat(match[1]) || 1;
    let unit = (match[2] || 'g').trim().toLowerCase().replace(/\./g, '');
    if (unit.startsWith('tbsp') || unit.startsWith('tablespoon')) unit = 'tbsp';
    else if (unit.startsWith('tsp') || unit.startsWith('teaspoon')) unit = 'tsp';
    else if (unit.startsWith('gram') || unit === 'g') unit = 'g';
    else if (unit.startsWith('cup')) unit = 'cup';
    else if (unit.startsWith('serving') || unit.startsWith('portion')) unit = 'serving';
    else if (unit.startsWith('unit') || unit.startsWith('piece')) unit = 'unit';
    else if (unit.startsWith('oz') || unit.startsWith('ounce')) unit = 'oz';
    else if (unit.startsWith('ml') || unit.startsWith('milliliter')) unit = 'ml';
    else unit = 'g';
    return { num, unit };
  }
  return { num: parseFloat(qtyStr) || 1, unit: 'g' };
}

          console.error("Autocomplete search error:", err);
          dropdown.style.display = 'none';
        });
    }, 200);
  });
  
  document.addEventListener('click', function(e) {
    if (!row.contains(e.target)) {
      dropdown.style.display = 'none';
    }
  });
  
  triggerMacroRecalculation();
}

// Recalculate macros for edit form
function triggerMacroRecalculation() {
  clearTimeout(recalcDebounce);
  recalcDebounce = setTimeout(() => {
    const ingredients = [...document.querySelectorAll('#ingEditList .ing-edit-row-container')].map(row => {
      const nameInput = row.querySelector('.ing-name-input');
      const numInput = row.querySelector('.ing-qty-num');
      const unitSelect = row.querySelector('.ing-qty-unit');
      
      const num = numInput.value.trim();
      const unit = unitSelect.value;
      const quantity = `${num} ${unit === 'serving' ? 'servings' : (unit === 'unit' ? 'units' : unit)}`;
      
      return { name: nameInput.value.trim(), quantity: quantity.trim() };
    }).filter(i => i.name);
    
    if (ingredients.length === 0) {
      document.getElementById('editProtein').value = 0;
      document.getElementById('editCarbs').value = 0;
      document.getElementById('editFats').value = 0;
      document.getElementById('editCalories').value = 0;
      return;
    }
    
    fetch('/api/recipes/calculate_macros', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ingredients })
    })
      .then(res => res.json())
      .then(data => {
        if (!data.error) {
          document.getElementById('editProtein').value = Math.round(data.protein);
          document.getElementById('editCarbs').value = Math.round(data.carbs);
          document.getElementById('editFats').value = Math.round(data.fats);
          document.getElementById('editCalories').value = Math.round(data.calories);
          
          if (data.ingredients) {
            data.ingredients.forEach((ingData, idx) => {
              const row = document.querySelectorAll('#ingEditList .ing-edit-row-container')[idx];
              if (row) {
                const macroDisplay = row.querySelector('.ing-row-macros');
                if (macroDisplay) {
                  macroDisplay.textContent = `Macros: P: ${ingData.protein}g | C: ${ingData.carbs}g | F: ${ingData.fats}g | ${ingData.calories} kcal`;
                }
              }
            });
          }
        }
      })
      .catch(err => console.error("Macro recalculation error:", err));
  }, 300);
}

// Simplify serving metrics sizes
function getServingText(servingJson) {
  if (!servingJson) return 'serving (100g)';
  try {
    const data = typeof servingJson === 'string' ? JSON.parse(servingJson) : servingJson;
    const metric = data.metric || {};
    const metricText = metric.unit ? `${metric.quantity}${metric.unit}` : '';
    if (metricText) return `serving (${metricText})`;
    
    const common = data.common || {};
    const commonText = common.unit ? `${common.quantity} ${common.unit}` : '';
    if (commonText) return `serving (${commonText})`;
  } catch(e) {}
  return 'serving (100g)';
}

function startCameraScan() {
  const container = document.getElementById('barcodeReaderContainer');
  const btn = document.getElementById('toggleCameraBtn');
  const status = document.getElementById('barcodeStatus');
  
  if (html5QrCode) {
    stopCameraScan();
    return;
  }
  
  container.style.display = 'block';
  btn.innerHTML = `<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg> Stop Scanner`;
  status.textContent = 'Initializing camera...';
  
  html5QrCode = new Html5Qrcode("barcodeReader");
  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 250, height: 120 } },
    barcodeText => {
      document.getElementById('barcodeInput').value = barcodeText;
      status.textContent = `Scanned barcode: ${barcodeText}`;
      stopCameraScan();
    },
    errorMessage => {}
  ).then(() => {
    status.textContent = 'Camera active. Point at barcode.';
  }).catch(err => {
    console.error("Camera start failed:", err);
    status.textContent = 'Failed to access camera.';
    container.style.display = 'none';
    html5QrCode = null;
    btn.innerHTML = `<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> Scan Barcode`;
  });
}

function stopCameraScan() {
  const container = document.getElementById('barcodeReaderContainer');
  const btn = document.getElementById('toggleCameraBtn');
  const status = document.getElementById('barcodeStatus');
  
  if (html5QrCode) {
    html5QrCode.stop().then(() => {
      html5QrCode = null;
      container.style.display = 'none';
      btn.innerHTML = `<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> Scan Barcode`;
    }).catch(err => {
      console.error("Camera stop failed:", err);
      html5QrCode = null;
      container.style.display = 'none';
    });
  } else {
    container.style.display = 'none';
    btn.innerHTML = `<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> Scan Barcode`;
  }
}

// Search & Filter View Logic
let activeSearchTags = new Set();

function getAvailableTags() {
  const tagsSet = new Set();
  Object.values(db).forEach(r => {
    if (r.tags) {
      r.tags.forEach(t => {
        if (t) tagsSet.add(t.trim());
      });
    }
  });
  return Array.from(tagsSet).sort();
}

function renderSearchTags() {
  const container = document.getElementById('searchTagsContainer');
  const tags = getAvailableTags();
  if (tags.length === 0) {
    container.innerHTML = `<span style="font-size:12px; color:var(--neutral-gray2);">No tags available</span>`;
    return;
  }
  container.innerHTML = tags.map(t => {
    const isActive = activeSearchTags.has(t);
    return `
      <div class="category-pill ${isActive ? 'active' : ''}" onclick="toggleSearchTag('${t.replace(/'/g, "\\'")}', this)" style="padding: 6px 14px; font-size: 12px; border-radius: 20px; background: ${isActive ? 'var(--primary-100)' : 'white'}; border: 1px solid var(--primary-40); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; height: auto; width: auto; position: relative; top: 0; left: 0; margin: 0;">
        <span style="color: ${isActive ? 'white' : 'var(--neutral-black)'}; font-size: 12px; font-weight: 600; width: auto; position: static;">${t}</span>
      </div>
    `;
  }).join('');
}

function toggleSearchTag(tag, el) {
  if (activeSearchTags.has(tag)) {
    activeSearchTags.delete(tag);
  } else {
    activeSearchTags.add(tag);
  }
  renderSearchTags();
  runSearchFilter();
}

function updateSearchFilterVal(type, val) {
  if (type === 'min-protein') {
    document.getElementById('display-min-protein').textContent = `${val}g`;
  } else if (type === 'max-carbs') {
    document.getElementById('display-max-carbs').textContent = val == 150 ? 'Any' : `${val}g`;
  } else if (type === 'max-fats') {
    document.getElementById('display-max-fats').textContent = val == 100 ? 'Any' : `${val}g`;
  } else if (type === 'max-cals') {
    document.getElementById('display-max-cals').textContent = val == 1500 ? 'Any' : `${val} kcal`;
  }
  runSearchFilter();
}

function resetSearchFilters() {
  document.getElementById('filterSearchInput').value = '';
  document.getElementById('filter-min-protein').value = 0;
  document.getElementById('filter-max-carbs').value = 150;
  document.getElementById('filter-max-fats').value = 100;
  document.getElementById('filter-max-cals').value = 1500;
  
  document.getElementById('display-min-protein').textContent = '0g';
  document.getElementById('display-max-carbs').textContent = 'Any';
  document.getElementById('display-max-fats').textContent = 'Any';
  document.getElementById('display-max-cals').textContent = 'Any';
  
  activeSearchTags.clear();
  renderSearchTags();
  runSearchFilter();
}

function runSearchFilter() {
  const q = document.getElementById('filterSearchInput').value.toLowerCase().trim();
  const minProtein = parseFloat(document.getElementById('filter-min-protein').value);
  const maxCarbs = parseFloat(document.getElementById('filter-max-carbs').value);
  const maxFats = parseFloat(document.getElementById('filter-max-fats').value);
  const maxCals = parseFloat(document.getElementById('filter-max-cals').value);
  
  const filtered = Object.entries(db).filter(([id, r]) => {
    // 1. Text Search
    if (q) {
      const nameMatch = (r.name || '').toLowerCase().includes(q);
      const descMatch = (r.description || '').toLowerCase().includes(q);
      const ingMatch = (r.ingredients || []).some(i => (i.name || '').toLowerCase().includes(q));
      if (!nameMatch && !descMatch && !ingMatch) return false;
    }
    
    // 2. Macros Filtering
    const macros = r.macros || {};
    const p = parseFloat(macros.protein || 0);
    const c = parseFloat(macros.carbs || 0);
    const f = parseFloat(macros.fats || 0);
    const cal = parseFloat(macros.calories || 0);
    
    if (p < minProtein) return false;
    if (maxCarbs < 150 && c > maxCarbs) return false;
    if (maxFats < 100 && f > maxFats) return false;
    if (maxCals < 1500 && cal > maxCals) return false;
    
    // 3. Tags Filtering
    if (activeSearchTags.size > 0) {
      const rTags = (r.tags || []).map(t => t.toLowerCase().trim());
      for (let activeTag of activeSearchTags) {
        if (!rTags.includes(activeTag.toLowerCase().trim())) {
          return false;
        }
      }
    }
    
    return true;
  });
  
  document.getElementById('searchResultsCount').textContent = filtered.length;
  
  const resultsContainer = document.getElementById('searchResultsContainer');
  if (filtered.length === 0) {
    resultsContainer.innerHTML = `<div style="text-align: center; padding: 24px; color: #748189; font-size:14px;">No recipes match the search filters.</div>`;
    return;
  }
  
  resultsContainer.innerHTML = filtered.slice(0, 20).map(([id, r]) => {
    return `
      <div class="editor-choice-card" onclick="openRecipeDetails('${id}')" style="display: flex; align-items: center; background: #fff; border-radius: 16px; padding: 12px; box-shadow: 0 4px 12px rgba(10,37,51,0.05); cursor: pointer; border: 1px solid var(--primary-40); margin-bottom: 8px;">
        <div style="width: 64px; height: 64px; border-radius: 12px; background-color: var(--primary-20); margin-right: 12px; flex-shrink: 0; overflow: hidden; position: relative;">
          <img src="${getRecipeImageUrl(r)}" loading="lazy" style="width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0;" onerror="this.style.display='none'">
        </div>
        <div style="flex: 1; min-width: 0;">
          <h4 style="font-size: 15px; font-weight: 600; color: #0a2533; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${r.name || 'Untitled'}</h4>
          <p style="font-size: 12px; color: #748189; margin: 4px 0 0 0;">${Math.round(r.macros.protein || 0)}g Protein | ${Math.round(r.macros.calories || 0)} kcal</p>
        </div>
      </div>
    `;
  }).join('');
}

let currentDetailTab = 'ingredients';

function setDetailTab(tab) {
  currentDetailTab = tab;
  const titleEl = document.getElementById('detailSectionTitle');
  const countEl = document.getElementById('detailIngCount');
  const btnEl = document.getElementById('showInstructionsBtn');
  const ingListEl = document.getElementById('detailIngList');
  const insListEl = document.getElementById('detailInsList');

  if (!btnEl) return;

  if (tab === 'ingredients') {
    if (titleEl) titleEl.textContent = 'Ingredients';
    if (countEl) countEl.style.display = 'inline';
    btnEl.innerHTML = '📋 Instructions';
    if (ingListEl) ingListEl.style.setProperty('display', 'flex', 'important');
    if (insListEl) insListEl.style.setProperty('display', 'none', 'important');
  } else {
    if (titleEl) titleEl.textContent = 'Instructions';
    if (countEl) countEl.style.display = 'none';
    btnEl.innerHTML = '🥗 Ingredients';
    if (ingListEl) ingListEl.style.setProperty('display', 'none', 'important');
    if (insListEl) insListEl.style.setProperty('display', 'flex', 'important');
  }
}

function toggleDetailTab() {
  if (currentDetailTab === 'ingredients') {
    setDetailTab('instructions');
  } else {
    setDetailTab('ingredients');
  }
}

// Dynamic sub-views loader
async function loadSubViews() {
  const views = [
    { id: 'view-home', url: 'home/index.html', bodyClass: '.v701_909' },
    { id: 'view-detail', url: 'main/index.html', bodyClass: '.v701_949' },
    { id: 'view-account', url: 'account/index.html', bodyClass: '.v701_1067' },
    { id: 'view-manual', url: 'manual/index.html', bodyClass: '.view-manual-container' }
  ];
  for (const view of views) {
    try {
      const response = await fetch(view.url);
      const text = await response.text();
      const parser = new DOMParser();
      const doc = parser.parseFromString(text, 'text/html');
      
      const viewContainer = doc.querySelector(view.bodyClass);
      const targetEl = document.getElementById(view.id);
      if (viewContainer && targetEl) {
        targetEl.innerHTML = viewContainer.innerHTML;
      } else {
        console.error(`Could not load sub-view for ${view.id}: Container element not found.`);
      }
    } catch (err) {
      console.error(`Error loading sub-view for ${view.id}:`, err);
    }
  }
}

// ==================== MANUAL CHECK VIEWS & FUNCTIONS ====================
let failedRecipes = {};
let manualRecalcDebounce = null;

// Fetch and render failed recipes list
async function initManualCheck() {
  const container = document.getElementById('manualFailedRecipesContainer');
  if (!container) return;
  
  container.innerHTML = `<div style="text-align: center; padding: 20px; color: #748189; font-size:14px;">Loading failed recipes...</div>`;
  
  try {
    const res = await fetch('/api/manual_check/recipes');
    failedRecipes = await res.json();
    
    const entries = Object.entries(failedRecipes);
    
    // Update badge count
    const badge = document.getElementById('manualCheckBadge');
    if (badge) {
      badge.textContent = entries.length;
      badge.style.display = entries.length > 0 ? 'inline-block' : 'none';
    }
    
    if (entries.length === 0) {
      container.innerHTML = `
        <div style="text-align: center; padding: 40px 20px; color: #748189; background: var(--primary-20); border: 1px solid var(--primary-40); border-radius: 16px;">
          <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="margin-bottom: 8px; color: var(--primary-100);"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          <p style="font-size: 14px; font-weight: 700; color: #0a2533; font-family: 'Outfit';">All Caught Up!</p>
          <p style="font-size: 12px; margin-top: 4px;">No failed recipes require manual review at this time.</p>
        </div>
      `;
      return;
    }
    
    container.innerHTML = entries.map(([id, r]) => {
      const addedDate = r.added_on ? r.added_on.split(' ')[0] : 'Unknown date';
      const handle = getCreatorHandle(r.url);
      return `
        <div style="background: #fff; border: 1px solid var(--primary-40); border-radius: 16px; padding: 16px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 4px 12px rgba(10,37,51,0.03);">
          <div>
            <h4 style="font-family: 'Outfit'; font-size: 15px; font-weight: 700; color: #0a2533; margin: 0; line-height: 1.3;">${r.name || 'Failed TikTok Recipe'}</h4>
            <span style="font-size: 11px; color: #748189; margin-top: 4px; display: inline-block;">${handle} • Fetch Date: ${addedDate}</span>
          </div>
          <button onclick="openFailedRecipeReview('${id}')" style="width: 100%; border: none; outline: none; background: var(--primary-100); color: white; border-radius: 12px; padding: 10px; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; transition: background 0.2s;">
            Review Details
          </button>
        </div>
      `;
    }).join('');
  } catch(e) {
    console.error("Error loading failed recipes:", e);
    container.innerHTML = `<div style="text-align: center; padding: 20px; color: #b91c1c; font-size:13px;">Failed to load reviews. Check server status.</div>`;
  }
}

// Open failed recipe review details form
function openFailedRecipeReview(id) {
  const r = failedRecipes[id];
  if (!r) return;
  
  document.getElementById('manualReviewId').value = id;
  document.getElementById('manualReviewName').value = r.name || 'Untitled Recipe';
  document.getElementById('manualReviewDesc').value = r.description || '';
  document.getElementById('manualReviewTags').value = (r.tags || []).join(', ');
  
  // Set original transcript
  document.getElementById('manualOrigDesc').textContent = r.description || 'No transcript or description available.';
  
  // Set TikTok link
  const linkEl = document.getElementById('manualOrigUrl');
  if (r.url) {
    linkEl.href = r.url;
    linkEl.style.display = 'block';
  } else {
    linkEl.style.display = 'none';
  }
  
  // Clear and populate ingredients list
  const list = document.getElementById('manualIngEditList');
  list.innerHTML = '';
  
  const ingredients = r.ingredients || [];
  if (ingredients.length > 0) {
    ingredients.forEach(i => addManualIngredientRow(i.name, i.quantity));
  } else {
    addManualIngredientRow();
  }
  
  // Try to parse instructions if stored as array or guess from description
  const instructionsBox = document.getElementById('manualReviewInstructions');
  if (r.instructions && Array.isArray(r.instructions) && r.instructions.length > 0) {
    instructionsBox.value = r.instructions.join('\n');
  } else {
    // Attempt to guess from transcript steps
    const guessedSteps = getSteps(r.description);
    if (guessedSteps.length > 0) {
      instructionsBox.value = guessedSteps.map(s => s.text).join('\n');
    } else {
      instructionsBox.value = '';
    }
  }
  
  // Hide list and show review form
  document.getElementById('manualListState').style.display = 'none';
  document.getElementById('manualReviewState').style.display = 'block';
  
  triggerManualMacroRecalculation();
}

// Add ingredient row to manual review page
function addManualIngredientRow(name='', qtyStr='') {
  const parsed = parseQtyString(qtyStr);
  const list = document.getElementById('manualIngEditList');
  const row = document.createElement('div');
  row.className = 'ing-edit-row-container';
  row.style = 'display: flex; flex-direction: column; gap: 4px; border-bottom: 1px solid var(--primary-40); padding-bottom: 8px; margin-bottom: 8px;';
  
  row.innerHTML = `
    <div class="ing-edit-row" style="display: flex; gap: 8px; align-items: center;">
      <div class="autocomplete-container" style="flex: 1; position: relative;">
        <input type="text" class="ing-name-input" placeholder="Ingredient name" value="${name.replace(/"/g,'&quot;')}" autocomplete="off" required style="width: 100%;">
        <div class="autocomplete-dropdown" style="display: none; position: absolute; top:100%; left:0; right:0; background:white; z-index:1000; max-height:160px; overflow-y:auto; border: 1px solid var(--primary-40); border-radius:12px;"></div>
      </div>
      <input type="number" step="any" class="ing-qty-num" placeholder="Qty" value="${parsed.num}" style="width: 65px; padding: 12px 6px; border-radius: 12px; border: 1px solid var(--primary-40); outline: none; background: var(--primary-20); font-family: inherit; font-size: 14px;" required>
      <select class="ing-qty-unit" style="width: 100px; padding: 12px 6px; border-radius: 12px; border: 1px solid var(--primary-40); outline: none; background: var(--primary-20); font-family: inherit; font-size: 13px;">
        <option value="g" ${parsed.unit === 'g' ? 'selected' : ''}>g</option>
        <option value="tsp" ${parsed.unit === 'tsp' ? 'selected' : ''}>tsp (5g)</option>
        <option value="tbsp" ${parsed.unit === 'tbsp' ? 'selected' : ''}>tbsp (15g)</option>
        <option value="cup" ${parsed.unit === 'cup' ? 'selected' : ''}>cup (240g)</option>
        <option value="serving" ${parsed.unit === 'serving' ? 'selected' : ''}>serving</option>
        <option value="unit" ${parsed.unit === 'unit' ? 'selected' : ''}>unit</option>
        <option value="oz" ${parsed.unit === 'oz' ? 'selected' : ''}>oz</option>
        <option value="ml" ${parsed.unit === 'ml' ? 'selected' : ''}>ml</option>
      </select>
      <button type="button" class="ing-del" style="background:#fee2e2; border:none; border-radius:10px; width:36px; height:36px; cursor:pointer; color:#991b1b; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="ing-row-macros" style="font-size: 11px; color: var(--primary-100); padding-left: 4px; font-weight: 600;"></div>
  `;
  
  list.appendChild(row);
  
  const input = row.querySelector('.ing-name-input');
  const qtyNumInput = row.querySelector('.ing-qty-num');
  const qtyUnitSelect = row.querySelector('.ing-qty-unit');
  const dropdown = row.querySelector('.autocomplete-dropdown');
  const delBtn = row.querySelector('.ing-del');
  
  input.addEventListener('input', triggerManualMacroRecalculation);
  qtyNumInput.addEventListener('input', triggerManualMacroRecalculation);
  qtyUnitSelect.addEventListener('change', triggerManualMacroRecalculation);
  
  delBtn.addEventListener('click', () => {
    row.remove();
    triggerManualMacroRecalculation();
  });
  
  if (name) {
    fetch(`/api/ingredients/search?q=${encodeURIComponent(name)}`)
      .then(res => res.json())
      .then(data => {
        if (data.results && data.results.length > 0) {
          const match = data.results.find(x => x.name.toLowerCase() === name.toLowerCase()) || data.results[0];
          if (match && match.serving) {
            const opt = qtyUnitSelect.querySelector('option[value="serving"]');
            opt.textContent = getServingText(match.serving);
          }
        }
      });
  }

  let debounceTimeout = null;
  input.addEventListener('input', function() {
    const q = input.value.trim();
    clearTimeout(debounceTimeout);
    if (q.length < 2) {
      dropdown.style.display = 'none';
      return;
    }
    
    debounceTimeout = setTimeout(() => {
      fetch(`/api/ingredients/search?q=${encodeURIComponent(q)}`)
        .then(res => res.json())
        .then(data => {
          if (data.results && data.results.length > 0) {
            dropdown.innerHTML = data.results.map(item => {
              return `
                <div class="autocomplete-item" data-name="${item.name.replace(/"/g,'&quot;')}" data-serving="${(item.serving || '').replace(/"/g,'&quot;')}" style="padding:10px; cursor:pointer; font-size:12px; border-bottom: 1px solid var(--primary-40); display:flex; justify-content:space-between;">
                  <span style="font-weight:600; color:#0a2533;">${item.name}</span>
                  <span style="color:var(--neutral-gray2);">P:${item.protein.toFixed(0)}g Cal:${item.calories}</span>
                </div>
              `;
            }).join('');
            dropdown.style.display = 'block';
            
            dropdown.querySelectorAll('.autocomplete-item').forEach(el => {
              el.addEventListener('click', function() {
                input.value = el.getAttribute('data-name');
                const servingVal = el.getAttribute('data-serving');
                if (servingVal) {
                  const opt = qtyUnitSelect.querySelector('option[value="serving"]');
                  opt.textContent = getServingText(servingVal);
                  qtyUnitSelect.value = 'serving';
                }
                dropdown.style.display = 'none';
                triggerManualMacroRecalculation();
              });
            });
          } else {
            dropdown.style.display = 'none';
          }
        })
        .catch(err => {
          console.error("Autocomplete search error:", err);
          dropdown.style.display = 'none';
        });
    }, 200);
  });
  
  document.addEventListener('click', function(e) {
    if (!row.contains(e.target)) {
      dropdown.style.display = 'none';
    }
  });
  
  triggerManualMacroRecalculation();
}

// Trigger macro recalculation for manual check ingredients
function triggerManualMacroRecalculation() {
  clearTimeout(manualRecalcDebounce);
  manualRecalcDebounce = setTimeout(() => {
    const ingredients = [...document.querySelectorAll('#manualIngEditList .ing-edit-row-container')].map(row => {
      const nameInput = row.querySelector('.ing-name-input');
      const numInput = row.querySelector('.ing-qty-num');
      const unitSelect = row.querySelector('.ing-qty-unit');
      
      const num = numInput.value.trim();
      const unit = unitSelect.value;
      const quantity = `${num} ${unit === 'serving' ? 'servings' : (unit === 'unit' ? 'units' : unit)}`;
      
      return { name: nameInput.value.trim(), quantity: quantity.trim() };
    }).filter(i => i.name);
    
    if (ingredients.length === 0) {
      document.getElementById('manualProtein').textContent = '0g';
      document.getElementById('manualCarbs').textContent = '0g';
      document.getElementById('manualFats').textContent = '0g';
      document.getElementById('manualCalories').textContent = '0';
      return;
    }
    
    fetch('/api/recipes/calculate_macros', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ingredients })
    })
      .then(res => res.json())
      .then(data => {
        if (!data.error) {
          document.getElementById('manualProtein').textContent = `${Math.round(data.protein)}g`;
          document.getElementById('manualCarbs').textContent = `${Math.round(data.carbs)}g`;
          document.getElementById('manualFats').textContent = `${Math.round(data.fats)}g`;
          document.getElementById('manualCalories').textContent = `${Math.round(data.calories)}`;
          
          if (data.ingredients) {
            data.ingredients.forEach((ingData, idx) => {
              const row = document.querySelectorAll('#manualIngEditList .ing-edit-row-container')[idx];
              if (row) {
                const macroDisplay = row.querySelector('.ing-row-macros');
                if (macroDisplay) {
                  macroDisplay.textContent = `Macros: P: ${ingData.protein}g | C: ${ingData.carbs}g | F: ${ingData.fats}g | ${ingData.calories} kcal`;
                }
              }
            });
          }
        }
      })
      .catch(err => console.error("Macro recalculation error:", err));
  }, 300);
}

// Approve and promote the recipe to main DB
async function saveManualApprove(e) {
  e.preventDefault();
  const id = document.getElementById('manualReviewId').value;
  const name = document.getElementById('manualReviewName').value;
  const description = document.getElementById('manualReviewDesc').value;
  const tags = document.getElementById('manualReviewTags').value.split(',').map(t => t.trim()).filter(Boolean);
  
  const ingredients = [...document.querySelectorAll('#manualIngEditList .ing-edit-row-container')].map(row => {
    const nameInput = row.querySelector('.ing-name-input');
    const numInput = row.querySelector('.ing-qty-num');
    const unitSelect = row.querySelector('.ing-qty-unit');
    
    const num = numInput.value.trim();
    const unit = unitSelect.value;
    const quantity = `${num} ${unit === 'serving' ? 'servings' : (unit === 'unit' ? 'units' : unit)}`;
    
    return { name: nameInput.value.trim(), quantity: quantity.trim() };
  }).filter(i => i.name);

  const instructionsText = document.getElementById('manualReviewInstructions').value;
  const instructions = instructionsText.split('\n').map(s => s.trim()).filter(Boolean);

  const orig = failedRecipes[id] || {};

  const payload = {
    id: id,
    name: name,
    url: orig.url || '',
    description: description,
    ingredients: ingredients,
    instructions: instructions,
    tags: tags
  };

  try {
    const res = await fetch('/api/manual_check/approve', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const result = await res.json();
    if (result.success) {
      alert("Recipe successfully approved and promoted to the main database!");
      // Reload main database so search contains it
      await loadDB();
      // Reset manual check list state
      goBackToManualList();
      await initManualCheck();
      updateManualBadgeOnly();
    } else {
      alert("Error promoting recipe: " + (result.error || "Unknown error"));
    }
  } catch(err) {
    console.error("Approve manual recipe error:", err);
    alert("Failed to approve recipe. Check server connection.");
  }
}

// Discard/Delete failed recipe
async function saveManualDelete() {
  const id = document.getElementById('manualReviewId').value;
  if (!confirm("Are you sure you want to discard this failed recipe? This will delete it permanently.")) {
    return;
  }
  
  try {
    const res = await fetch('/api/manual_check/delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id })
    });
    const result = await res.json();
    if (result.success) {
      goBackToManualList();
      await initManualCheck();
      updateManualBadgeOnly();
    } else {
      alert("Error deleting: " + (result.error || "Unknown error"));
    }
  } catch(err) {
    console.error("Delete failed recipe error:", err);
    alert("Failed to delete recipe. Check server connection.");
  }
}

// Update the badge counter on the profile tab without rendering the list
async function updateManualBadgeOnly() {
  try {
    const res = await fetch('/api/manual_check/recipes');
    const data = await res.json();
    const count = Object.keys(data).length;
    const badge = document.getElementById('manualCheckBadge');
    if (badge) {
      badge.textContent = count;
      badge.style.display = count > 0 ? 'inline-block' : 'none';
    }
  } catch(e) {
    console.error("Error updating manual review badge:", e);
  }
}

function goBackToManualList() {
  document.getElementById('manualReviewState').style.display = 'none';
  document.getElementById('manualListState').style.display = 'block';
}

function goBackToAccount() {
  switchView('account');
}

// Initialize application
async function initApp() {
  await loadSubViews();
  
  // Attach searchInput listener now that home view is loaded
  const searchInput = document.getElementById('searchInput');
  if (searchInput) {
    searchInput.addEventListener('input', () => {
      render();
    });
  }
  
  // Attach infinite scroll listener for Editor's Choice list
  const viewHome = document.getElementById('view-home');
  if (viewHome) {
    viewHome.addEventListener('scroll', function(e) {
      const el = e.target;
      if (el.scrollHeight - el.scrollTop - el.clientHeight < 150) {
        const filtered = getFiltered();
        if (visibleEditorChoices < filtered.length) {
          visibleEditorChoices += 20;
          renderEditorsChoice();
        }
      }
    });
  }
  
  await loadDB();
  updateManualBadgeOnly();
  
  // Fade out loading screen
  const loadingScreen = document.getElementById('app-loading-screen');
  if (loadingScreen) {
    loadingScreen.style.opacity = '0';
    setTimeout(() => {
      loadingScreen.style.display = 'none';
    }, 400);
  }
}

initApp();
