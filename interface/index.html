<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Grams">
<title>Grams - Macro Finder & Planner</title>
<link rel="icon" type="image/png" href="baker.png">
<link rel="apple-touch-icon" href="baker.png">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- QR Code / Barcode Scanning library -->
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<style>
:root {
  --primary-100: #129575;
  --primary-80: #71B1A1;
  --primary-60: #AFD3CA;
  --primary-40: #DBEBE7;
  --primary-20: #F6FAF9;
  --secondary-100: #FF9C00;
  --secondary-20: #FFE1B3;
  --rating: #FFAD30;
  --success: #31B057;
  --success-bg: #EAF7EE;
  
  --neutral-white: #FFFFFF;
  --neutral-gray4: #D9D9D9;
  --neutral-gray3: #A9A9A9;
  --neutral-gray2: #797979;
  --neutral-gray1: #484848;
  --neutral-black: #000000;
  
  --shadow-sm: 0 2px 8px rgba(18, 149, 117, 0.08);
  --shadow-md: 0 6px 16px rgba(18, 149, 117, 0.12);
  --shadow-lg: 0 12px 30px rgba(0, 0, 0, 0.12);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Poppins', sans-serif;
  background-color: var(--primary-20);
  color: var(--neutral-gray1);
  min-height: 100vh;
  padding-bottom: 80px;
}

/* Header styling based on Figma Colors */
.header {
  background: linear-gradient(135deg, var(--primary-100), var(--primary-80));
  padding: 24px 20px 32px;
  border-radius: 0 0 32px 32px;
  box-shadow: var(--shadow-md);
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.header-title {
  color: var(--neutral-white);
  font-size: 24px;
  font-weight: 600;
  letter-spacing: 0.5px;
}

.recipe-count {
  background: rgba(255, 255, 255, 0.25);
  color: var(--neutral-white);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 600;
}

/* Search Box design */
.search-wrap {
  position: relative;
}

.search-input {
  width: 100%;
  padding: 14px 48px;
  border-radius: 16px;
  border: 2px solid transparent;
  background: var(--neutral-white);
  font-size: 14px;
  font-family: 'Poppins', sans-serif;
  color: var(--neutral-black);
  outline: none;
  transition: all 0.25s ease;
  box-shadow: var(--shadow-sm);
}

.search-input:focus {
  border-color: var(--primary-100);
  box-shadow: var(--shadow-md);
}

.search-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--primary-100);
}

.search-clear {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: var(--neutral-gray3);
  display: none;
  padding: 2px;
}

/* Filter Pills styling */
.filter-section {
  padding: 20px 20px 0;
}

.filter-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--primary-100);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
}

.pills-row {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding-bottom: 8px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}

.pills-row::-webkit-scrollbar {
  display: none;
}

.pill {
  flex-shrink: 0;
  padding: 8px 18px;
  border-radius: 12px;
  border: 1px solid var(--primary-40);
  background: var(--neutral-white);
  color: var(--primary-100);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  font-family: 'Poppins', sans-serif;
}

.pill:hover {
  background: var(--primary-20);
}

.pill.active {
  background: var(--primary-100);
  color: var(--neutral-white);
  border-color: var(--primary-100);
  box-shadow: var(--shadow-sm);
}

/* Macro Filters styling */
.macro-row {
  display: flex;
  gap: 10px;
  padding: 16px 20px 0;
  flex-wrap: wrap;
}

.macro-filter {
  flex: 1;
  min-width: 100px;
  background: var(--neutral-white);
  border-radius: 14px;
  padding: 10px 14px;
  border: 1px solid var(--primary-40);
  box-shadow: var(--shadow-sm);
}

.macro-filter label {
  font-size: 10px;
  font-weight: 600;
  color: var(--primary-80);
  text-transform: uppercase;
  display: block;
  margin-bottom: 4px;
}

.macro-filter input {
  width: 100%;
  border: none;
  outline: none;
  font-size: 14px;
  font-family: 'Poppins', sans-serif;
  color: var(--neutral-gray1);
  background: transparent;
}

/* Card list styling */
.cards {
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.card {
  background: var(--neutral-white);
  border-radius: 20px;
  border: 1px solid var(--primary-40);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  cursor: pointer;
  transition: all 0.25s ease;
}

.card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}

.card-header {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 18px 18px 14px;
}

.card-icon {
  width: 48px;
  height: 48px;
  border-radius: 14px;
  background: var(--primary-20);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: var(--primary-100);
  border: 1px solid var(--primary-40);
}

.card-info {
  flex: 1;
  min-width: 0;
}

.card-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--neutral-black);
  line-height: 1.35;
  margin-bottom: 6px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.tag {
  padding: 3px 10px;
  border-radius: 50px;
  font-size: 11px;
  font-weight: 500;
  background: var(--primary-20);
  color: var(--primary-100);
}

/* Macros row in Card */
.macros {
  display: flex;
  border-top: 1px solid var(--primary-20);
  padding: 12px 18px;
}

.macro {
  flex: 1;
  text-align: center;
}

.macro-val {
  font-size: 15px;
  font-weight: 600;
  color: var(--primary-100);
}

.macro-lbl {
  font-size: 10px;
  color: var(--neutral-gray2);
  font-weight: 500;
  text-transform: uppercase;
}

.macro:not(:last-child) {
  border-right: 1px solid var(--primary-20);
}

.calories .macro-val {
  color: var(--secondary-100);
}

/* Actions in Card */
.card-actions {
  display: flex;
  gap: 10px;
  padding: 0 18px 18px;
}

.btn-details {
  flex: 2;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px;
  border-radius: 12px;
  border: 1px solid var(--primary-100);
  background: var(--primary-100);
  color: var(--neutral-white);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Poppins', sans-serif;
  transition: all 0.2s ease;
}

.btn-details:hover {
  background: #0f7d62;
  border-color: #0f7d62;
}

.btn-edit {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px;
  border-radius: 12px;
  border: 1px solid var(--secondary-100);
  background: transparent;
  color: var(--secondary-100);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Poppins', sans-serif;
  transition: all 0.2s ease;
}

.btn-edit:hover {
  background: var(--secondary-20);
}

/* Details and Video modal */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(4px);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
}

.modal.open {
  display: flex;
}

.modal-box {
  background: var(--neutral-white);
  border-radius: 28px 28px 0 0;
  padding: 24px;
  width: 100%;
  max-width: 480px;
  max-height: 92vh;
  overflow-y: auto;
  position: relative;
  box-shadow: var(--shadow-lg);
  animation: slideUp 0.3s ease-out;
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.modal-header {
  position: relative;
  margin-bottom: 16px;
  padding-right: 40px;
}

.modal-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--neutral-black);
}

.modal-close {
  position: absolute;
  top: 0;
  right: 0;
  background: var(--primary-20);
  border: none;
  border-radius: 50%;
  width: 32px;
  height: 32px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--primary-100);
  transition: all 0.2s ease;
}

.modal-close:hover {
  background: var(--primary-40);
}

/* Video Frame (TikTok Embed style) */
.video-container {
  width: 100%;
  border-radius: 16px;
  overflow: hidden;
  background: var(--neutral-black);
  margin-bottom: 16px;
  box-shadow: var(--shadow-sm);
  display: flex;
  justify-content: center;
}

.video-iframe {
  width: 100%;
  height: 480px;
  border: none;
}

/* Creator Info Bar (Figma Inspired) */
.creator-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid var(--primary-20);
  margin-bottom: 16px;
}

.creator-info {
  display: flex;
  align-items: center;
  gap: 10px;
}

.creator-avatar {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: var(--primary-60);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  color: var(--neutral-white);
  font-size: 14px;
}

.creator-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--neutral-black);
}

.creator-subtitle {
  font-size: 11px;
  color: var(--neutral-gray2);
}

.recipe-stats {
  display: flex;
  gap: 10px;
  font-size: 12px;
  color: var(--neutral-gray2);
  font-weight: 500;
}

.stat-item {
  display: flex;
  align-items: center;
  gap: 4px;
}

/* Ingredients Section (Figma Components) */
.details-section-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--neutral-black);
  margin-bottom: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.details-section-count {
  font-size: 12px;
  color: var(--neutral-gray2);
  font-weight: 400;
}

.figma-ingredients-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 20px;
}

.figma-ingredient-card {
  display: flex;
  align-items: center;
  background: var(--primary-20);
  border-radius: 12px;
  padding: 12px 16px;
  border: 1px solid var(--primary-40);
  transition: all 0.2s ease;
}

.figma-ingredient-card:hover {
  background: var(--primary-40);
}

.figma-ingredient-icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: var(--neutral-white);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  margin-right: 12px;
  box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
}

.figma-ingredient-name {
  flex: 1;
  font-size: 13px;
  font-weight: 500;
  color: var(--neutral-gray1);
}

.figma-ingredient-qty {
  font-size: 13px;
  font-weight: 600;
  color: var(--neutral-gray2);
}

/* Macros Card (below ingredients) */
.macros-panel {
  background: var(--neutral-white);
  border: 1px solid var(--primary-40);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-sm);
}

.macros-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

.macro-box {
  background: var(--primary-20);
  border-radius: 10px;
  padding: 8px 4px;
  text-align: center;
}

.macro-box.calories {
  background: var(--secondary-20);
}

.macro-box-val {
  font-size: 14px;
  font-weight: 600;
  color: var(--primary-100);
}

.macro-box.calories .macro-box-val {
  color: var(--secondary-100);
}

.macro-box-lbl {
  font-size: 9px;
  color: var(--neutral-gray2);
  font-weight: 500;
  text-transform: uppercase;
  margin-top: 2px;
}

/* Instructions steps layout from figma-to-html(1) */
.figma-instructions-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 12px;
}

.figma-step-card {
  background: var(--primary-20);
  border-radius: 12px;
  padding: 16px;
  border: 1px solid var(--primary-40);
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.figma-step-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--primary-100);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.figma-step-desc {
  font-size: 13px;
  color: var(--neutral-gray1);
  line-height: 1.45;
}

/* Edit Modal & Form */
.edit-form {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-top: 8px;
}

.form-group label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--primary-100);
  text-transform: uppercase;
  margin-bottom: 6px;
  letter-spacing: 0.5px;
}

.form-group input, .form-group textarea {
  width: 100%;
  padding: 12px 16px;
  border-radius: 12px;
  border: 1px solid var(--primary-40);
  font-size: 14px;
  font-family: 'Poppins', sans-serif;
  color: var(--neutral-black);
  outline: none;
  transition: all 0.2s ease;
  background: var(--primary-20);
}

.form-group input:focus, .form-group textarea:focus {
  border-color: var(--primary-100);
  background: var(--neutral-white);
  box-shadow: var(--shadow-sm);
}

/* Read-only macros styling */
.form-group input.readonly-macro {
  background-color: var(--neutral-gray4);
  color: var(--neutral-gray2);
  cursor: not-allowed;
  font-weight: 600;
}

.macro-inputs {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.btn-save {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  background: var(--primary-100);
  color: var(--neutral-white);
  border: none;
  font-size: 15px;
  font-family: 'Poppins', sans-serif;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: var(--shadow-sm);
}

.btn-save:hover {
  background: #0f7d62;
  box-shadow: var(--shadow-md);
}

/* Barcode button style */
.btn-barcode {
  background: var(--secondary-20);
  color: var(--secondary-100);
  border: 1px solid var(--secondary-100);
  border-radius: 12px;
  padding: 10px;
  font-family: 'Poppins', sans-serif;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-bottom: 8px;
  transition: all 0.2s ease;
}

.btn-barcode:hover {
  background: var(--secondary-100);
  color: white;
}

/* Dynamic Autocomplete List */
.autocomplete-container {
  position: relative;
  flex: 1;
}

.autocomplete-dropdown {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: var(--neutral-white);
  border: 1px solid var(--primary-40);
  border-radius: 12px;
  box-shadow: var(--shadow-lg);
  max-height: 200px;
  overflow-y: auto;
  z-index: 1000;
  margin-top: 4px;
}

.autocomplete-item {
  padding: 10px 14px;
  cursor: pointer;
  font-size: 12px;
  border-bottom: 1px solid var(--primary-20);
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: background 0.15s ease;
}

.autocomplete-item:hover {
  background: var(--primary-20);
  color: var(--primary-100);
}

.autocomplete-item-name {
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 70%;
}

.autocomplete-item-macros {
  font-size: 10px;
  color: var(--neutral-gray2);
  font-weight: 600;
}

/* Ingredients edit row */
.ing-edit-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 8px;
}

.ing-edit-row {
  display: flex;
  gap: 8px;
  align-items: center;
}

.ing-del {
  background: #fee2e2;
  border: none;
  border-radius: 10px;
  width: 36px;
  height: 36px;
  cursor: pointer;
  color: #991b1b;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s ease;
}

.ing-del:hover {
  background: #fecaca;
}

.btn-add-ing {
  background: var(--primary-20);
  border: 1px dashed var(--primary-100);
  border-radius: 12px;
  padding: 10px;
  width: 100%;
  color: var(--primary-100);
  font-family: 'Poppins', sans-serif;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.btn-add-ing:hover {
  background: var(--primary-40);
}

/* Empty State */
.empty {
  text-align: center;
  padding: 48px 24px;
  color: var(--primary-80);
}

.empty svg {
  margin-bottom: 12px;
  opacity: 0.6;
}

.empty h3 {
  font-size: 18px;
  margin-bottom: 6px;
  color: var(--primary-100);
}

.missing-badge {
  background: var(--secondary-20);
  color: var(--secondary-100);
  border-radius: 6px;
  font-size: 11px;
  font-weight: 500;
  padding: 2px 8px;
  display: inline-block;
  margin-top: 4px;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1 class="header-title" style="display: flex; align-items: center; gap: 8px;">
      <img src="baker.png" alt="Grams Logo" style="height: 32px; width: 32px; border-radius: 8px; object-fit: cover; background: white; padding: 2px;">
      Grams
    </h1>
    <span class="recipe-count" id="countBadge">0 recipes</span>
  </div>
  <div class="search-wrap">
    <svg class="search-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="search-input" id="searchInput" type="text" placeholder="Search title, ingredient, tag…" autocomplete="off">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>
</div>

<div class="filter-section">
  <div class="filter-label">Filter by Tag</div>
  <div class="pills-row" id="pillsRow"></div>
</div>

<div class="macro-row">
  <div class="macro-filter">
    <label>Min Protein (g)</label>
    <input type="number" id="minProtein" placeholder="e.g. 20" min="0">
  </div>
  <div class="macro-filter">
    <label>Max Calories</label>
    <input type="number" id="maxCalories" placeholder="e.g. 500" min="0">
  </div>
  <div class="macro-filter">
    <label>Max Carbs (g)</label>
    <input type="number" id="maxCarbs" placeholder="e.g. 50" min="0">
  </div>
</div>

<div class="cards" id="cardsContainer"></div>

<!-- Details Modal (Embeds TikTok & Figma layouts) -->
<div class="modal" id="detailsModal" onclick="closeModal('detailsModal')">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header" style="display: flex; align-items: center; justify-content: space-between; padding-right: 80px; position: relative;">
      <div class="modal-title" id="detailsModalTitle" style="flex: 1; margin-right: 12px;">Recipe Details</div>
      <button class="btn-edit" id="detailsEditBtn" style="padding: 6px 12px; border-radius: 8px; font-size: 12px; margin-right: 12px; border-color: var(--primary-100); color: var(--primary-100); flex-shrink: 0;" onclick="closeModal('detailsModal'); openEdit(currentDetailsId)">

          <button type="button" class="btn-mult" data-val="2.0" onclick="setPortionMultiplier(2.0)" style="padding: 4px 8px; border: none; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; background: transparent; color: var(--primary-100); transition: all 0.2s;">2</button>

              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>

<script>
let db = {};
let activeTag = null;
let html5QrCode = null;
let recalcDebounce = null;
let currentDetailsId = null;
let currentRecipeIngredients = [];
let currentRecipeMacros = {};
let currentRecipeDetailedIngredients = [];

// Helper to extract TikTok Video ID and return the Embed Player URL
function getTikTokEmbedUrl(url) {
  if (!url) return '';
  const m = url.match(/\/video\/(\d+)/);
  if (m && m[1]) {
    return `https://www.tiktok.com/embed/v2/${m[1]}`;
  }
  return '';
}

// Helper to estimate emoji based on ingredient name
function getIngredientEmoji(name) {
  name = name.toLowerCase();
  if (name.includes('chicken') || name.includes('poultry')) return '🍗';
  if (name.includes('beef') || name.includes('steak') || name.includes('meat') || name.includes('pork')) return '🥩';
  if (name.includes('egg')) return '🥚';
  if (name.includes('fish') || name.includes('salmon') || name.includes('tuna') || name.includes('seafood')) return '🐟';
  if (name.includes('shrimp') || name.includes('prawn')) return '🍤';
  if (name.includes('oil') || name.includes('butter')) return '🧈';
  if (name.includes('rice') || name.includes('quinoa') || name.includes('grain')) return '🍚';
  if (name.includes('bread') || name.includes('flour') || name.includes('dough')) return '🍞';
  if (name.includes('tomato') || name.includes('sauce') || name.includes('paste')) return '🍅';
  if (name.includes('cheese') || name.includes('mozzarella') || name.includes('parmesan')) return '🧀';
  if (name.includes('garlic') || name.includes('onion')) return '🧄';
  if (name.includes('potato') || name.includes('fry') || name.includes('fries')) return '🥔';
  if (name.includes('broccoli') || name.includes('spinach') || name.includes('kale') || name.includes('salad') || name.includes('greens')) return '🥦';
  if (name.includes('lemon') || name.includes('lime') || name.includes('citrus')) return '🍋';
  if (name.includes('avocado')) return '🥑';
  if (name.includes('milk') || name.includes('cream') || name.includes('yogurt')) return '🥛';
  if (name.includes('honey') || name.includes('sugar') || name.includes('sweetener')) return '🍯';
  if (name.includes('chocolate') || name.includes('cocoa')) return '🍫';
  if (name.includes('pepper') || name.includes('spice') || name.includes('salt')) return '🌶️';
  return '🥗'; // default food emoji
}

// Extract creator handle from TikTok URL
function getCreatorHandle(url) {
  if (!url) return 'TikTok Creator';
  const m = url.match(/tiktok\.com\/@([^\/]+)/);
  return m && m[1] ? '@' + m[1] : 'TikTok Creator';
}

// Parsing steps from free-form description
function getSteps(desc) {
  if (!desc) return [];
  
  // Clean up "Instructions:" header if present
  let cleanDesc = desc.replace(/Instructions:?/i, '').trim();
  
  // Check if it has numbered list: e.g. 1. 2. or Step 1:
  const stepRegex = /(?:\r?\n|^|\s)(?:Step\s+)?(\d+)[.:\)-]\s*/gi;
  const parts = cleanDesc.split(stepRegex);
  
  if (parts.length > 2) {
    const steps = [];
    for (let i = 1; i < parts.length; i += 2) {
      const num = parts[i];
      const text = parts[i+1] ? parts[i+1].trim() : '';
      if (text) {
        steps.push({ num: parseInt(num) || (steps.length + 1), text });
      }
    }
    if (steps.length > 0) return steps;
  }
  
  // Fallback: split by newlines or sentences
  const sentences = cleanDesc.split(/\r?\n|(?<=[.!?])\s+/);
  return sentences
    .map(s => s.trim())
    .filter(s => s.length > 10)
    .map((text, idx) => ({ num: idx + 1, text }));
}

async function loadDB() {
  try {
    const r = await fetch('recipes_db.json');
    db = await r.json();
  } catch(e) {
    db = {};
  }
  render();
  buildPills();
}

function buildPills() {
  const tags = new Set();
  Object.values(db).forEach(r => (r.tags||[]).forEach(t => tags.add(t)));
  const row = document.getElementById('pillsRow');
  row.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'pill active';
  all.textContent = 'All';
  all.onclick = () => setTag(null, all);
  row.appendChild(all);
  [...tags].sort().forEach(t => {
    const p = document.createElement('button');
    p.className = 'pill';
    p.textContent = t;
    p.onclick = () => setTag(t, p);
    row.appendChild(p);
  });
}

function setTag(tag, el) {
  activeTag = tag;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  render();
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const minP = parseFloat(document.getElementById('minProtein').value) || 0;
  const maxCal = parseFloat(document.getElementById('maxCalories').value) || Infinity;
  const maxCarb = parseFloat(document.getElementById('maxCarbs').value) || Infinity;

  return Object.entries(db).filter(([id, r]) => {
    if (activeTag && !(r.tags||[]).includes(activeTag)) return false;
    const m = r.macros || {};
    if (Math.round(m.protein||0) < minP) return false;
    if (m.calories > 0 && Math.round(m.calories) > maxCal) return false;
    if (m.carbs > 0 && Math.round(m.carbs) > maxCarb) return false;
    if (!q) return true;
    if (q.includes(',')) {
      const terms = q.split(',').map(t => t.trim()).filter(Boolean);
      return terms.every(term => 
        (r.ingredients||[]).some(i => (i.name||'').toLowerCase().includes(term))
      );
    }
    if ((r.name||'').toLowerCase().includes(q)) return true;
    if ((r.description||'').toLowerCase().includes(q)) return true;
    if ((r.ingredients||[]).some(i => (i.name||'').toLowerCase().includes(q))) return true;
    if ((r.tags||[]).some(t => t.toLowerCase().includes(q))) return true;
    return false;
  });
}

function tagClass(t) {
  return 'tag';
}

function hasMacros(m) { return m && (m.protein>0||m.carbs>0||m.fats>0||m.calories>0); }

function render() {
  const filtered = getFiltered();
  const container = document.getElementById('cardsContainer');
  document.getElementById('countBadge').textContent = filtered.length + ' recipe' + (filtered.length!==1?'s':'');

  if (!filtered.length) {
    container.innerHTML = `<div class="empty">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M15 11h.01M11 15h.01M11 11h.01M15 15h.01M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>
      <h3>No recipes found</h3>
      <p>Try a different search or filter</p>
    </div>`;
    return;
  }

  container.innerHTML = filtered.map(([id, r]) => {
    const m = r.macros || {};
    const hasMac = hasMacros(m);
    const tags = (r.tags||[]).map(t => `<span class="${tagClass(t)}">${t}</span>`).join('');
    const macrosHtml = hasMac ? `
      <div class="macros">
        <div class="macro"><div class="macro-val">${Math.round(m.protein||0)}g</div><div class="macro-lbl">Protein</div></div>
        <div class="macro"><div class="macro-val">${Math.round(m.carbs||0)}g</div><div class="macro-lbl">Carbs</div></div>
        <div class="macro"><div class="macro-val">${Math.round(m.fats||0)}g</div><div class="macro-lbl">Fats</div></div>
        <div class="macro calories"><div class="macro-val">${Math.round(m.calories||0)}</div><div class="macro-lbl">Kcal</div></div>
      </div>` : `<div style="padding:10px 18px"><span class="missing-badge">⚠ Macros missing</span></div>`;

    return `<div class="card" id="card-${id}" onclick="openDetails('${id}')">
      <div class="card-header">
        <div class="card-icon">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2a9 9 0 0 1 9 9c0 4.97-4.03 9-9 9S3 15.97 3 11a9 9 0 0 1 9-9z"/><path d="M12 6v6l4 2"/></svg>
        </div>
        <div class="card-info">
          <div class="card-title">${r.name||'Untitled'}</div>
          ${tags ? `<div class="card-tags">${tags}</div>` : ''}
        </div>
      </div>
      ${macrosHtml}
      <div class="card-actions" onclick="event.stopPropagation()">
        <button class="btn-details" onclick="openDetails('${id}')" style="width: 100%;">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Watch Video & Details
        </button>
      </div>
    </div>`;
  }).join('');
}

function formatMultipliedQty(qtyStr, mult) {
  if (!qtyStr) return '';
  const match = qtyStr.match(/^\s*(\d+(?:\.\d+)?)\s*(.*)$/);
  if (match) {
    const num = parseFloat(match[1]) || 0;
    const unit = match[2] || '';
    const newNum = Number((num * mult).toFixed(2));
    return `${newNum}${unit ? ' ' + unit.trim() : ''}`;
  }
  return qtyStr;
}

function setPortionMultiplier(mult) {
  // Update active button styling
  document.querySelectorAll('.multiplier-group .btn-mult').forEach(btn => {
    if (parseFloat(btn.getAttribute('data-val')) === mult) {
      btn.classList.add('active');
      btn.style.background = 'var(--primary-100)';
      btn.style.color = 'white';
    } else {
      btn.classList.remove('active');
      btn.style.background = 'transparent';
      btn.style.color = 'var(--primary-100)';
    }
  });

  // 1. Scale and render ingredient quantities
  const ingList = document.getElementById('detailsIngList');
  if (currentRecipeIngredients.length > 0) {
    ingList.innerHTML = currentRecipeIngredients.map((i, idx) => {
      const scaledQty = formatMultipliedQty(i.quantity, mult);
      return `
        <div class="figma-ingredient-card" id="details-ing-${idx}">
          <div class="figma-ingredient-icon">${getIngredientEmoji(i.name)}</div>
          <div style="flex: 1;">
            <div class="figma-ingredient-name" style="font-weight: 600;">${i.name}</div>
            <div class="figma-ingredient-macros" style="font-size: 11px; color: var(--neutral-gray2); margin-top: 2px;">Loading macros...</div>
          </div>
          <div class="figma-ingredient-qty" style="align-self: flex-start;">${scaledQty}</div>
        </div>
      `;
    }).join('');
  } else {
    ingList.innerHTML = `<div style="color:var(--neutral-gray3); font-size:13px; text-align:center; padding:12px;">No ingredients listed</div>`;
  }

  // 2. Render individual ingredient macros scaled
  if (currentRecipeDetailedIngredients.length > 0) {
    currentRecipeDetailedIngredients.forEach((ingData, idx) => {
      const el = document.getElementById(`details-ing-${idx}`);
      if (el) {
        const macrosEl = el.querySelector('.figma-ingredient-macros');
        if (macrosEl) {
          const p = Number((ingData.protein * mult).toFixed(1));
          const c = Number((ingData.carbs * mult).toFixed(1));
          const f = Number((ingData.fats * mult).toFixed(1));
          const cal = Math.round(ingData.calories * mult);
          macrosEl.innerHTML = `P: ${p}g | C: ${c}g | F: ${f}g | ${cal} kcal`;
        }
      }
    });
  }

  // 3. Render total recipe macros scaled
  const macrosPanel = document.getElementById('detailsMacrosPanel');
  const m = currentRecipeMacros;
  if (hasMacros(m)) {
    macrosPanel.innerHTML = `
      <div class="macros-grid">
        <div class="macro-box">
          <div class="macro-box-val">${Math.round((m.protein||0) * mult)}g</div>
          <div class="macro-box-lbl">Protein</div>
        </div>
        <div class="macro-box">
          <div class="macro-box-val">${Math.round((m.carbs||0) * mult)}g</div>
          <div class="macro-box-lbl">Carbs</div>
        </div>
        <div class="macro-box">
          <div class="macro-box-val">${Math.round((m.fats||0) * mult)}g</div>
          <div class="macro-box-lbl">Fats</div>
        </div>
        <div class="macro-box calories">
          <div class="macro-box-val">${Math.round((m.calories||0) * mult)}</div>
          <div class="macro-box-lbl">Calories</div>
        </div>
      </div>
    `;
  } else {
    macrosPanel.innerHTML = `<span class="missing-badge" style="width:100%; text-align:center;">⚠ Nutritional macros missing for this recipe</span>`;
  }
}

function openDetails(id) {
  currentDetailsId = id;
  const r = db[id];
  document.getElementById('detailsModalTitle').textContent = r.name || 'Recipe Details';
  
  // Set creator info
  const handle = getCreatorHandle(r.url);
  document.getElementById('detailsCreatorName').textContent = handle;
  document.getElementById('detailsCreatorAvatar').textContent = handle.charAt(1).toUpperCase() || '🧑';
  
  // Detect servings from description if possible, otherwise show default "2 serves"
  const servingRegex = /(?:serves|servings|makes|portions)\s*(\d+)/i;
  const match = (r.description || '').match(servingRegex);
  const servesText = match && match[1] ? `${match[1]} serves` : '2 serves';
  document.getElementById('detailsServings').textContent = servesText;
  
  // Embed TikTok Iframe
  const embedUrl = getTikTokEmbedUrl(r.url);
  const videoContainer = document.getElementById('detailsVideoContainer');
  if (embedUrl) {
    videoContainer.innerHTML = `<iframe class="video-iframe" src="${embedUrl}" allowfullscreen></iframe>`;
  } else {
    // Fallback if no valid TikTok video link exists
    videoContainer.innerHTML = `<div style="width:100%; height:220px; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--neutral-gray2); background:#111;">
      <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="margin-bottom:8px;"><path d="M16 16v1a2 2 0 0 1-2 2H3a2 2 0 0 1-2 2V7a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v1m4-4h-4v12h4a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2z"/></svg>
      <span>No video link available</span>
    </div>`;
  }
  
  // Store ingredients and macros in state
  currentRecipeIngredients = r.ingredients || [];
  currentRecipeMacros = r.macros || {};
  currentRecipeDetailedIngredients = [];

  const ingCount = currentRecipeIngredients.length;
  document.getElementById('detailsIngCount').textContent = `${ingCount} item${ingCount !== 1 ? 's' : ''}`;
  
  // Set portion multiplier to 1 initially
  setPortionMultiplier(1.0);

  if (ingCount > 0) {
    // Fetch details macros breakdown from the backend
    fetch('/api/recipes/calculate_macros', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ ingredients: currentRecipeIngredients })
     })
      .then(res => res.json())
      .then(data => {
        if (data.ingredients) {
          currentRecipeDetailedIngredients = data.ingredients;
          
          // Re-render based on active portion multiplier select
          const activeBtn = document.querySelector('.multiplier-group .btn-mult.active');
          const currentMult = activeBtn ? parseFloat(activeBtn.getAttribute('data-val')) : 1.0;
          setPortionMultiplier(currentMult);
        }
      })
      .catch(err => {
        console.error("Error fetching ingredient breakdown:", err);
      });
  }
  
  // Instructions steps from figma-to-html(1)
  const stepsList = document.getElementById('detailsInstructionsList');
  const steps = getSteps(r.description);
  if (steps.length > 0) {
    stepsList.innerHTML = steps.map(s => `
      <div class="figma-step-card">
        <div class="figma-step-title">Step ${s.num}</div>
        <div class="figma-step-desc">${s.text}</div>
      </div>
    `).join('');
  } else {
    stepsList.innerHTML = `<div style="color:var(--neutral-gray3); font-size:13px; text-align:center; padding:12px;">No instructions provided</div>`;
  }
  
  document.getElementById('detailsModal').classList.add('open');
}

// Helper to parse quantity string (e.g., "3 tsp" or "100g") into numeric qty and unit
function parseQtyString(qtyStr) {
  if (!qtyStr) return { num: 1, unit: 'g' };
  const match = qtyStr.match(/^\s*(\d+(?:\.\d+)?)\s*([a-zA-Z\s\.]+)?$/);
  if (match) {
    const num = parseFloat(match[1]) || 1;
    let unit = (match[2] || 'g').trim().toLowerCase().replace(/\./g, '');
    if (unit.startsWith('tbsp') || unit.startsWith('tablespoon')) unit = 'tbsp';
    else if (unit.startsWith('tsp') || unit.startsWith('teaspoon')) unit = 'tsp';
    else if (unit.startsWith('gram') || unit === 'g') unit = 'g';
    else if (unit.startsWith('cup')) unit = 'cup';
    else if (unit.startsWith('serving') || unit.startsWith('portion')) unit = 'serving';
    else if (unit.startsWith('unit') || unit.startsWith('piece')) unit = 'unit';
    else if (unit.startsWith('oz') || unit.startsWith('ounce')) unit = 'oz';
    else if (unit.startsWith('ml') || unit.startsWith('milliliter')) unit = 'ml';
    else unit = 'g';
    return { num, unit };
  }
  return { num: parseFloat(qtyStr) || 1, unit: 'g' };
}

// Helper to formulate display label for the serving option
function getServingText(servingJson) {
  if (!servingJson) return 'serving (100g)';
  try {
    const data = typeof servingJson === 'string' ? JSON.parse(servingJson) : servingJson;
    const common = data.common || {};
    const metric = data.metric || {};
    const commonText = common.unit ? `${common.quantity} ${common.unit}` : '';
    const metricText = metric.unit ? `${metric.quantity}${metric.unit}` : '';
    if (commonText && metricText) return `serving (${commonText} / ${metricText})`;
    if (metricText) return `serving (${metricText})`;
    if (commonText) return `serving (${commonText})`;
  } catch(e) {}
  return 'serving (100g)';
}

function addIngredientRow(name='', qtyStr='') {
  const parsed = parseQtyString(qtyStr);
  const list = document.getElementById('ingEditList');
  const row = document.createElement('div');
  row.className = 'ing-edit-row-container';
  row.style = 'display: flex; flex-direction: column; gap: 4px; border-bottom: 1px solid var(--primary-20); padding-bottom: 8px; margin-bottom: 8px;';
  
  row.innerHTML = `
    <div class="ing-edit-row" style="display: flex; gap: 8px; align-items: center;">
      <div class="autocomplete-container" style="flex: 1;">
        <input type="text" class="ing-name-input" placeholder="Ingredient name" value="${name.replace(/"/g,'&quot;')}" autocomplete="off" required style="width: 100%;">
        <div class="autocomplete-dropdown" style="display: none;"></div>
      </div>
      <input type="number" step="any" class="ing-qty-num" placeholder="Qty" value="${parsed.num}" style="width: 75px; padding: 12px 8px; border-radius: 12px; border: 1px solid var(--primary-40); outline: none; background: var(--primary-20); font-family: inherit; font-size: 14px;" required>
      <select class="ing-qty-unit" style="width: 105px; padding: 12px 8px; border-radius: 12px; border: 1px solid var(--primary-40); outline: none; background: var(--primary-20); font-family: inherit; font-size: 13px;">
        <option value="g" ${parsed.unit === 'g' ? 'selected' : ''}>g</option>
        <option value="tsp" ${parsed.unit === 'tsp' ? 'selected' : ''}>tsp</option>
        <option value="tbsp" ${parsed.unit === 'tbsp' ? 'selected' : ''}>tbsp</option>
        <option value="cup" ${parsed.unit === 'cup' ? 'selected' : ''}>cup</option>
        <option value="serving" ${parsed.unit === 'serving' ? 'selected' : ''}>serving</option>
        <option value="unit" ${parsed.unit === 'unit' ? 'selected' : ''}>unit</option>
        <option value="oz" ${parsed.unit === 'oz' ? 'selected' : ''}>oz</option>
        <option value="ml" ${parsed.unit === 'ml' ? 'selected' : ''}>ml</option>
      </select>
      <button type="button" class="ing-del" style="background:#fee2e2; border:none; border-radius:10px; width:36px; height:36px; cursor:pointer; color:#991b1b; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="ing-row-macros" style="font-size: 11px; color: var(--primary-100); padding-left: 4px; font-weight: 500;"></div>
  `;
  
  list.appendChild(row);
  
  const input = row.querySelector('.ing-name-input');
  const qtyNumInput = row.querySelector('.ing-qty-num');
  const qtyUnitSelect = row.querySelector('.ing-qty-unit');
  const dropdown = row.querySelector('.autocomplete-dropdown');
  const delBtn = row.querySelector('.ing-del');
  
  input.addEventListener('input', triggerMacroRecalculation);
  qtyNumInput.addEventListener('input', triggerMacroRecalculation);
  qtyUnitSelect.addEventListener('change', triggerMacroRecalculation);
  
  delBtn.addEventListener('click', () => {
    row.remove();
    triggerMacroRecalculation();
  });
  
  if (name) {
    fetch(`/api/ingredients/search?q=${encodeURIComponent(name)}`)
      .then(res => res.json())
      .then(data => {
        if (data.results && data.results.length > 0) {
          const match = data.results.find(x => x.name.toLowerCase() === name.toLowerCase()) || data.results[0];
          if (match && match.serving) {
            const opt = qtyUnitSelect.querySelector('option[value="serving"]');
            opt.textContent = getServingText(match.serving);
          }
        }
      });
  }

  let debounceTimeout = null;
  input.addEventListener('input', function() {
    const q = input.value.trim();
    clearTimeout(debounceTimeout);
    if (q.length < 2) {
      dropdown.style.display = 'none';
      return;
    }
    
    debounceTimeout = setTimeout(() => {
      fetch(`/api/ingredients/search?q=${encodeURIComponent(q)}`)
        .then(res => res.json())
        .then(data => {
          if (data.results && data.results.length > 0) {
            dropdown.innerHTML = data.results.map(item => {
              const servingText = getServingText(item.serving);
              return `
                <div class="autocomplete-item" data-name="${item.name.replace(/"/g,'&quot;')}" data-serving="${(item.serving || '').replace(/"/g,'&quot;')}">
                  <span class="autocomplete-item-name">${item.name}</span>
                  <span class="autocomplete-item-macros">P:${item.protein.toFixed(0)}g Cal:${item.calories}</span>
                </div>
              `;
            }).join('');
            dropdown.style.display = 'block';
            
            dropdown.querySelectorAll('.autocomplete-item').forEach(el => {
              el.addEventListener('click', function() {
                input.value = el.getAttribute('data-name');
                const servingVal = el.getAttribute('data-serving');
                if (servingVal) {
                  const opt = qtyUnitSelect.querySelector('option[value="serving"]');
                  opt.textContent = getServingText(servingVal);
                  qtyUnitSelect.value = 'serving';
                }
                dropdown.style.display = 'none';
                triggerMacroRecalculation();
              });
            });
          } else {
            dropdown.style.display = 'none';
          }
        })
        .catch(err => {
          console.error("Autocomplete search error:", err);
          dropdown.style.display = 'none';
        });
    }, 200);
  });
  
  document.addEventListener('click', function(e) {
    if (!row.contains(e.target)) {
      dropdown.style.display = 'none';
    }
  });

  triggerMacroRecalculation();
}

function triggerMacroRecalculation() {
  clearTimeout(recalcDebounce);
  recalcDebounce = setTimeout(() => {
    const ingredients = [...document.querySelectorAll('#ingEditList .ing-edit-row-container')].map(row => {
      const nameInput = row.querySelector('.ing-name-input');
      const numInput = row.querySelector('.ing-qty-num');
      const unitSelect = row.querySelector('.ing-qty-unit');
      
      const num = numInput.value.trim();
      const unit = unitSelect.value;
      const quantity = `${num} ${unit === 'serving' ? 'servings' : (unit === 'unit' ? 'units' : unit)}`;
      
      return { name: nameInput.value.trim(), quantity: quantity.trim() };
    }).filter(i => i.name);
    
    if (ingredients.length === 0) {
      document.getElementById('editProtein').value = 0;
      document.getElementById('editCarbs').value = 0;
      document.getElementById('editFats').value = 0;
      document.getElementById('editCalories').value = 0;
      return;
    }
    
    fetch('/api/recipes/calculate_macros', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ ingredients })
    })
      .then(res => res.json())
      .then(data => {
        if (!data.error) {
          document.getElementById('editProtein').value = Math.round(data.protein);
          document.getElementById('editCarbs').value = Math.round(data.carbs);
          document.getElementById('editFats').value = Math.round(data.fats);
          document.getElementById('editCalories').value = Math.round(data.calories);
          
          if (data.ingredients) {
            data.ingredients.forEach((ingData, idx) => {
              const row = document.querySelectorAll('#ingEditList .ing-edit-row-container')[idx];
              if (row) {
                const macroDisplay = row.querySelector('.ing-row-macros');
                if (macroDisplay) {
                  macroDisplay.textContent = `Macros: P: ${ingData.protein}g | C: ${ingData.carbs}g | F: ${ingData.fats}g | ${ingData.calories} kcal`;
                }
              }
            });
          }
        }
      })
      .catch(err => {
        console.error("Macro recalculation error:", err);
      });
  }, 300);
}

// Open Food Facts Barcode scanner and search handlers
function toggleBarcodeScanner() {
  const sec = document.getElementById('barcodeSection');
  if (sec.style.display === 'none') {
    sec.style.display = 'block';
  } else {
    stopCameraScan();
    sec.style.display = 'none';
  }
}

function startCameraScan() {
  const container = document.getElementById('barcodeReaderContainer');
  const btn = document.getElementById('toggleCameraBtn');
  const status = document.getElementById('barcodeStatus');
  
  if (html5QrCode) {
    stopCameraScan();
    return;
  }
  
  container.style.display = 'block';
  btn.innerHTML = `
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M18 6 6 18M6 6l12 12"/>
    </svg>
    Stop Scanner
  `;
  status.textContent = 'Initializing camera...';
  
  html5QrCode = new Html5Qrcode("barcodeReader");
  html5QrCode.start(
    { facingMode: "environment" },
    {
      fps: 10,
      qrbox: { width: 250, height: 120 }
    },
    barcodeText => {
      document.getElementById('barcodeInput').value = barcodeText;
      status.textContent = `Scanned barcode: ${barcodeText}`;
      stopCameraScan();
    },
    errorMessage => {
      // scan errors happen continuously when no code is found, ignore them
    }
  ).then(() => {
    status.textContent = 'Camera active. Point at barcode.';
  }).catch(err => {
    console.error("Camera start failed:", err);
    status.textContent = 'Failed to access camera.';
    container.style.display = 'none';
    html5QrCode = null;
    btn.innerHTML = `
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      Scan Barcode
    `;
  });
}

function stopCameraScan() {
  const container = document.getElementById('barcodeReaderContainer');
  const btn = document.getElementById('toggleCameraBtn');
  const status = document.getElementById('barcodeStatus');
  
  if (html5QrCode) {
    html5QrCode.stop().then(() => {
      html5QrCode = null;
      container.style.display = 'none';
      btn.innerHTML = `
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        Scan Barcode
      `;
    }).catch(err => {
      console.error("Camera stop failed:", err);
      html5QrCode = null;
      container.style.display = 'none';
      btn.innerHTML = `
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        Scan Barcode
      `;
    });
  } else {
    container.style.display = 'none';
    btn.innerHTML = `
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      Scan Barcode
    `;
  }
}

function searchBarcode() {
  const input = document.getElementById('barcodeInput');
  const val = input.value.trim();
  if (!val) return;
  
  const status = document.getElementById('barcodeStatus');
  status.textContent = 'Searching Open Food Facts...';
  lookupBarcode(val);
}

function lookupBarcode(barcode) {
  const status = document.getElementById('barcodeStatus');
  fetch(`/api/barcode/lookup?barcode=${encodeURIComponent(barcode)}`)
    .then(res => res.json())
    .then(data => {
      if (data.success) {
        status.textContent = `Found: ${data.name}!`;
        // Add to ingredients list
        addIngredientRow(data.name, '100g');
        // Clear input
        document.getElementById('barcodeInput').value = '';
        // Close scanner after a small delay
        setTimeout(() => {
          document.getElementById('barcodeSection').style.display = 'none';
          status.textContent = '';
        }, 1500);
      } else {
        status.textContent = 'Product not found in Open Food Facts.';
      }
    })
    .catch(err => {
      console.error("Barcode lookup failed:", err);
      status.textContent = 'Error looking up barcode.';
    });
}

async function saveEdit(e) {
  e.preventDefault();
  const id = document.getElementById('editId').value;
  if (!db[id]) return;
  
  const updatedRecipe = {
    id: id,
    name: document.getElementById('editName').value,
    tags: document.getElementById('editTags').value.split(',').map(t => t.trim()).filter(Boolean),
    ingredients: [...document.querySelectorAll('#ingEditList .ing-edit-row-container')].map(row => {
      const nameInput = row.querySelector('.ing-name-input');
      const numInput = row.querySelector('.ing-qty-num');
      const unitSelect = row.querySelector('.ing-qty-unit');
      
      const num = numInput.value.trim();
      const unit = unitSelect.value;
      const quantity = `${num} ${unit === 'serving' ? 'servings' : (unit === 'unit' ? 'units' : unit)}`;
      
      return { name: nameInput.value.trim(), quantity: quantity.trim() };
    }).filter(i => i.name)
  };

  try {
    const res = await fetch('/api/recipes/update', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(updatedRecipe)
    });
    const result = await res.json();
    if (result.success) {
      db[id] = result.recipe;
      closeModal('editModal');
      render();
      buildPills();
    } else {
      alert("Error saving changes: " + (result.error || "Unknown error"));
    }
  } catch(err) {
    console.error("Save edit error:", err);
    alert("Failed to save changes. Please check server connection.");
  }
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  if (id === 'detailsModal') {
    document.getElementById('detailsVideoContainer').innerHTML = '';
  }
  if (id === 'editModal') {
    stopCameraScan();
  }
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').style.display = 'none';
  render();
}

document.getElementById('searchInput').addEventListener('input', function() {
  document.getElementById('searchClear').style.display = this.value ? 'flex' : 'none';
  render();
});

['minProtein','maxCalories','maxCarbs'].forEach(id => {
  document.getElementById(id).addEventListener('input', render);
});

loadDB();

  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => console.log('Service Worker registered successfully:', reg.scope))
      .catch(err => console.log('Service Worker registration failed:', err));
  });
}
