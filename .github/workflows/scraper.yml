name: TikTok Recipe Scraper

on:
  schedule:
    - cron: '0 * * * *'  # Runs exactly every hour
  workflow_dispatch:     # Allows manual trigger from the GitHub Actions tab

jobs:
  scrape-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright & Chromium with OS Dependencies
        run: |
          python -m playwright install --with-deps chromium

      - name: Run Grams Sync Engine
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
          TIKTOK_COOKIES_JSON: ${{ secrets.TIKTOK_COOKIES_JSON }}
          TIKTOK_PLAYLIST_URL: ${{ secrets.TIKTOK_PLAYLIST_URL }}
        run: |
          python sync_recipes.py
          python match_ingredients.py
